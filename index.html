<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Musyrif</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary:#2e7d32; --bg:#f5f7f5; --card:#fff; --text:#1b1b1b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 16px; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, var(--primary), #4caf50); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 25px; border-radius: 16px; width: 90%; max-width: 400px; }
        .login-header { text-align: center; margin-bottom: 20px; }
        .login-tabs { display: flex; margin-bottom: 15px; border-bottom: 2px solid #e0e0e0; }
        .tab-btn { flex: 1; padding: 10px; background: none; border: none; cursor: pointer; font-weight: 600; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; }
        .btn { width: 100%; padding: 11px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; margin-bottom: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-wa { background: #25D366; color: white; }
        .error-msg { background: #ffebee; color: #d32f2f; padding: 8px; border-radius: 6px; margin-bottom: 10px; display: none; }
        #main-app { display: none; max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 20px; padding: 15px; background: linear-gradient(135deg, var(--primary), #4caf50); color: white; border-radius: 12px; position: relative; }
        .logout-btn { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px; border-radius: 6px; cursor: pointer; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .card h2 { margin-bottom: 12px; color: var(--primary); }
        .admin-section { display: none; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-card { background: linear-gradient(135deg, var(--primary), #4caf50); color: white; padding: 15px; border-radius: 10px; text-align: center; }
        .stat-card .val { font-size: 1.8rem; font-weight: bold; }
        .schedule-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
        .schedule-item { padding: 10px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fafafa; }
        .time { font-weight: bold; color: var(--primary); }
        .history-table { width: 100%; border-collapse: collapse; }
        .history-table th, .history-table td { padding: 8px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        .history-table th { background: #f1f1f1; }
        .photo-thumb { width: 35px; height: 35px; object-fit: cover; border-radius: 4px; }
        @media (max-width: 600px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <div class="login-header"><h2>📋 Absensi Musyrif</h2><p>Pilih akses masuk</p></div>
            <div class="login-tabs">
                <button class="tab-btn active" onclick="switchTab('musyrif')">👤 Musyrif</button>
                <button class="tab-btn" onclick="switchTab('admin')">🛡️ Admin</button>
            </div>
            <div id="login-error" class="error-msg"></div>
            <form id="musyrif-form">
                <div class="form-group">
                    <label>Asrama</label>
                    <select id="m-asrama" required onchange="updateMusyrifSelect()">
                        <option value="">-- Pilih Asrama --</option>
                        <option value="al-hakim">Asrama Al Hakim</option>
                        <option value="al-fattah">Asrama Al Fattah</option>
                        <option value="al-karim">Asrama Al Karim</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nama Musyrif</label>
                    <select id="m-name" required disabled>
                        <option value="">-- Pilih Asrama Terlebih Dahulu --</option>
                    </select>
                </div>
                <div class="form-group"><label>Password</label><input type="password" id="m-pass" required></div>
                <button type="submit" class="btn btn-primary">🔐 Masuk Musyrif</button>
                <button type="button" class="btn btn-wa" onclick="waForgot()">💬 Lupa Password? (WA)</button>
            </form>
            <form id="admin-form" style="display:none;">
                <div class="form-group"><label>PIN Admin</label><input type="password" id="a-pin" placeholder="1234" required></div>
                <button type="submit" class="btn btn-primary">🛡️ Masuk Admin</button>
            </form>
        </div>
    </div>

    <div id="main-app">
        <header>
            <h1 id="app-title">Dashboard</h1>
            <p id="user-label"></p>
            <button class="logout-btn" onclick="location.reload()">Keluar</button>
        </header>
        
        <div id="admin-panel" class="admin-section">
            <div class="card">
                <h2>⚙️ Pengaturan</h2>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="loadData()">🔄 Refresh Data</button>
                </div>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><div class="val" id="s-today">0</div><div>Hari Ini</div></div>
                <div class="stat-card"><div class="val" id="s-week">0</div><div>Minggu Ini</div></div>
                <div class="stat-card"><div class="val" id="s-month">0</div><div>Bulan Ini</div></div>
                <div class="stat-card"><div class="val" id="s-active">0/12</div><div>Aktif</div></div>
            </div>
            <div class="card">
                <h2>📜 Semua Data Absensi</h2>
                <div style="overflow-x:auto;">
                    <table class="history-table">
                        <thead><tr><th>Waktu</th><th>Nama</th><th>Asrama</th><th>Kegiatan</th><th>Foto</th></tr></thead>
                        <tbody id="admin-tbody"><tr><td colspan="5" style="text-align:center;padding:20px;">Klik "Refresh Data"</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="musyrif-view">
            <div class="card"><h2>📅 Jadwal Hari Ini</h2><div class="schedule-grid" id="sched-grid"></div></div>
            <div class="card">
                <h2>📝 Input Absensi</h2>
                <form id="absen-form">
                    <div class="form-group"><label>Kegiatan</label><select id="act-select" required><option value="">-- Pilih Kegiatan --</option></select></div>
                    <div class="form-group"><label>Foto</label><input type="file" id="photo-in" accept="image/*" capture="user" required></div>
                    <div class="form-group"><label>Catatan</label><textarea id="notes" rows="2" style="width:100%;padding:10px;border:2px solid #e0e0e0;border-radius:8px;"></textarea></div>
                    <button type="submit" class="btn btn-primary" id="sub-btn">✅ Kirim Absensi</button>
                </form>
            </div>
            <div class="card">
                <h2>📜 Riwayat Saya</h2>
                <table class="history-table">
                    <thead><tr><th>Waktu</th><th>Kegiatan</th><th>Foto</th></tr></thead>
                    <tbody id="my-tbody"><tr><td colspan="3" style="text-align:center;padding:15px;">Belum ada</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4K-OSCqKE5GWK5ztyDbXu6WgJ7MvS1cnxZWctmPgSTIrGLT-BwiK5vPPBBx7wZabOHQ/exec";
        const ADMIN_PIN = "1234";
        const WA_ADMIN = "6285893588373";
        
        const MUSYRIF_BY_ASMARA = {
            "al-hakim": { name: "Asrama Al Hakim", musyrif: { "Ali Mashuri": { pass: "ali123", rooms: ["Khondak"] }, "Ali Zahid": { pass: "zahid123", rooms: ["Badar"] }, "Reva Dwi": { pass: "reva123", rooms: ["Khoibar"] }, "Imam Syafi'i": { pass: "imam123", rooms: ["Multazam"] } } },
            "al-fattah": { name: "Asrama Al Fattah", musyrif: { "Fattahilah": { pass: "fattah123", rooms: ["Quba"] }, "Brian Adi": { pass: "brian123", rooms: ["Bir Ali"] }, "Babil Yasar": { pass: "babil123", rooms: ["Mina"] }, "Fahmi": { pass: "fahmi123", rooms: ["Arofah"] }, "Wawan Febi": { pass: "wawan123", rooms: ["RBQ"] } } },
            "al-karim": { name: "Asrama Al Karim", musyrif: { "Bima Julian": { pass: "bima123", rooms: ["101"] }, "Irfan Khoirul": { pass: "irfan123", rooms: ["104"] }, "Rizki Alfian": { pass: "rizki123", rooms: ["203"] } } }
        };

        const JOBS = [
            { n: "Membangunkan Santri", t: "03:45", e: "04:35", days: [0,1,2,3,4,5,6] },
            { n: "Pengajian Subuh", t: "05:00", e: "05:45", days: [0,1,2,3,4,5,6] },
            { n: "Piket Kamar", t: "16:30", e: "17:30", days: [0,1,2,3,4,5,6] },
            { n: "Jam Tidur", t: "21:30", e: "22:30", days: [0,1,2,3,4,5,6] }
        ];

        let role = null, user = null, data = [], currentAsrama = null;
        
        function switchTab(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('musyrif-form').style.display = t === 'admin' ? 'none' : 'block';
            document.getElementById('admin-form').style.display = t === 'admin' ? 'block' : 'none';
        }

        function updateMusyrifSelect() {
            const asrama = document.getElementById('m-asrama').value;
            const sel = document.getElementById('m-name');
            sel.innerHTML = '<option value="">-- Pilih Musyrif --</option>';
            if (asrama && MUSYRIF_BY_ASMARA[asrama]) {
                sel.disabled = false;
                Object.keys(MUSYRIF_BY_ASMARA[asrama].musyrif).forEach(name => {
                    sel.innerHTML += `<option value="${name}">${name}</option>`;
                });
            } else {
                sel.disabled = true;
            }
        }

        function waForgot() {
            const n = document.getElementById('m-name').value;
            if (!n) return alert('Pilih nama dulu!');
            window.open(`https://wa.me/${WA_ADMIN}?text=${encodeURIComponent(`Saya ${n} lupa password`)}`);
        }

        document.getElementById('musyrif-form').onsubmit = e => {
            e.preventDefault();
            const asrama = document.getElementById('m-asrama').value;
            const n = document.getElementById('m-name').value;
            const p = document.getElementById('m-pass').value;
            if (MUSYRIF_BY_ASMARA[asrama]?.musyrif[n]?.pass === p) {
                login(n, MUSYRIF_BY_ASMARA[asrama].musyrif[n].rooms.join(', '), 'musyrif', asrama);
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        };

        document.getElementById('admin-form').onsubmit = e => {
            e.preventDefault();
            if (document.getElementById('a-pin').value === ADMIN_PIN) {
                login('Admin', 'Full Access', 'admin', null);
            } else {
                alert('PIN salah!');
            }
        };

        function login(name, room, r, asrama) {
            role = r; user = { name, room }; currentAsrama = asrama;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('app-title').textContent = r === 'admin' ? '🛡️ Dashboard Admin' : '📋 Absensi Musyrif';
            document.getElementById('user-label').textContent = `${name} | ${room}`;
            if (r === 'admin') {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('musyrif-view').style.display = 'none';
            } else {
                document.getElementById('admin-panel').style.display = 'none';
                document.getElementById('musyrif-view').style.display = 'block';
            }
            loadData();
            renderSched();
            updJobs();
        }

        function renderSched() {
            const now = new Date(), day = now.getDay();
            document.getElementById('sched-grid').innerHTML = JOBS.filter(j => j.days.includes(day)).map(j => 
                `<div class="schedule-item"><div class="time">${j.t} - ${j.e}</div><div>${j.n}</div></div>`
            ).join('');
        }

        function updJobs() {
            const day = new Date().getDay();
            const sel = document.getElementById('act-select');
            sel.innerHTML = '<option value="">-- Pilih Kegiatan --</option>';
            JOBS.filter(j => j.days.includes(day)).forEach(j => {
                sel.innerHTML += `<option value="${j.n}">${j.n} (${j.t}-${j.e})</option>`;
            });
        }

        async function loadData() {
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL);
                data = await res.json();
                if (role === 'admin') renderAdminTable();
                else renderMyTable();
            } catch (e) {
                console.error('Error:', e);
                alert('Gagal load data. Pastikan Google Script sudah di-deploy dengan akses "Anyone"');
            }
        }

        function renderAdminTable() {
            if (data.length === 0) {
                document.getElementById('admin-tbody').innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;">Belum ada data</td></tr>';
                return;
            }
            document.getElementById('admin-tbody').innerHTML = data.slice().reverse().map(d => `
                <tr>
                    <td>${new Date(d.Timestamp).toLocaleString()}</td>
                    <td>${d['Nama Musyrif']}</td>
                    <td>${d.Asrma || '-'}</td>
                    <td>${d.Kegiatan}</td>
                    <td>${d.Foto ? `<img src="${d.Foto}" class="photo-thumb">` : '-'}</td>
                </tr>
            `).join('');
        }

        function renderMyTable() {
            const my = data.filter(d => d['Nama Musyrif'] === user.name).reverse();
            if (my.length === 0) {
                document.getElementById('my-tbody').innerHTML = '<tr><td colspan="3" style="text-align:center;padding:15px;">Belum ada riwayat</td></tr>';
                return;
            }
            document.getElementById('my-tbody').innerHTML = my.map(d => `
                <tr>
                    <td>${new Date(d.Timestamp).toLocaleString()}</td>
                    <td>${d.Kegiatan}</td>
                    <td>${d.Foto ? `<img src="${d.Foto}" class="photo-thumb">` : '-'}</td>
                </tr>
            `).join('');
        }

        document.getElementById('absen-form').onsubmit = async e => {
            e.preventDefault();
            const act = document.getElementById('act-select').value;
            const photo = document.getElementById('photo-in').files[0];
            if (!act || !photo) { alert('Lengkapi semua field!'); return; }
            
            const btn = document.getElementById('sub-btn');
            btn.disabled = true;
            btn.textContent = 'Mengirim...';
            
            try {
                const b64 = await new Promise((r, j) => {
                    const rd = new FileReader();
                    rd.onload = () => r(rd.result);
                    rd.onerror = j;
                    rd.readAsDataURL(photo);
                });
                
                const payload = {
                    musyrif: user.name,
                    asrama: currentAsrama ? MUSYRIF_BY_ASMARA[currentAsrama].name : '',
                    kamar: user.room,
                    kegiatan: act,
                    foto: b64,
                    catatan: document.getElementById('notes').value
                };
                
                const res = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                const result = await res.json();
                
                if (result.result === 'success') {
                    alert('✅ Absensi berhasil dikirim!');
                    document.getElementById('absen-form').reset();
                    loadData();
                } else {
                    throw new Error(result.message);
                }
            } catch (err) {
                alert('❌ Gagal: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '✅ Kirim Absensi';
            }
        };

        setInterval(() => { if (role) { renderSched(); updJobs(); } }, 60000);
    </script>
</body>
</html>

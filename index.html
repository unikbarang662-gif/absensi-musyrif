<!DOCTYPE html>
<html>
<head>
    <title>Test Final Absensi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; padding: 20px; background: #e8f5e9; }
        .card { background: white; padding: 20px; border-radius: 15px; max-width: 400px; margin: 0 auto; }
        button { background: #2e7d32; color: white; padding: 12px; border: none; border-radius: 10px; width: 100%; margin-top: 10px; font-size: 16px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; }
        pre { background: #f0f0f0; padding: 10px; border-radius: 8px; font-size: 11px; overflow-x: auto; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align:center; color:#2e7d32;">📋 TEST ABSENSI</h2>
        
        <select id="nama">
            <option value="Ali Mashuri">Ali Mashuri</option>
            <option value="Ali Zahid">Ali Zahid</option>
            <option value="Reva Dwi">Reva Dwi</option>
        </select>
        
        <select id="kegiatan">
            <option value="Subuh">Subuh</option>
            <option value="Isya">Isya</option>
            <option value="Piket">Piket</option>
        </select>
        
        <input type="file" id="foto" accept="image/*">
        
        <button id="btnSimpan">📤 SIMPAN DATA</button>
        <button id="btnLihat" style="background:#1565c0;">👁️ LIHAT DATA</button>
        
        <h3>Hasil:</h3>
        <pre id="hasil">Belum ada aksi...</pre>
    </div>
    
    <script>
        // 🔧 GANTI URL INI DENGAN WEB APP ANDA!
        const API_URL = "https://script.google.com/macros/s/YOUR_URL_HERE/exec";
        
        const btnSimpan = document.getElementById('btnSimpan');
        const btnLihat = document.getElementById('btnLihat');
        const hasilDiv = document.getElementById('hasil');
        
        async function lihatData() {
            hasilDiv.innerHTML = "Mengambil data...";
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                hasilDiv.innerHTML = JSON.stringify(data, null, 2);
                if (data.length > 0) {
                    hasilDiv.innerHTML += "\n\n✅ Data ditemukan: " + data.length + " record";
                } else {
                    hasilDiv.innerHTML += "\n\n⚠️ Belum ada data di sheet";
                }
            } catch(err) {
                hasilDiv.innerHTML = "❌ ERROR: " + err.message;
            }
        }
        
        async function simpanData() {
            const nama = document.getElementById('nama').value;
            const kegiatan = document.getElementById('kegiatan').value;
            const file = document.getElementById('foto').files[0];
            
            if (!file) {
                hasilDiv.innerHTML = "❌ Pilih foto dulu!";
                return;
            }
            
            btnSimpan.disabled = true;
            btnSimpan.innerHTML = "Menyimpan...";
            hasilDiv.innerHTML = "Mengkonversi foto...";
            
            const reader = new FileReader();
            reader.onload = async function() {
                try {
                    hasilDiv.innerHTML = "Mengirim ke server...";
                    
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            nama: nama,
                            kegiatan: kegiatan,
                            foto: reader.result.substring(0, 100) + "...", // Ringkas foto
                            timestamp: new Date().toISOString()
                        })
                    });
                    
                    const result = await response.json();
                    hasilDiv.innerHTML = "RESPON SERVER:\n" + JSON.stringify(result, null, 2);
                    
                    if (result.success) {
                        hasilDiv.innerHTML += "\n\n✅ BERHASIL! Cek Google Sheet Anda.";
                    } else {
                        hasilDiv.innerHTML += "\n\n❌ GAGAL: " + result.error;
                    }
                    
                } catch(err) {
                    hasilDiv.innerHTML = "❌ ERROR FETCH: " + err.message;
                } finally {
                    btnSimpan.disabled = false;
                    btnSimpan.innerHTML = "📤 SIMPAN DATA";
                }
            };
            reader.readAsDataURL(file);
        }
        
        btnSimpan.onclick = simpanData;
        btnLihat.onclick = lihatData;
        
        // Cek koneksi saat load
        window.onload = function() {
            hasilDiv.innerHTML = "🔌 Mengecek koneksi ke: " + API_URL + "\n\nKlik 'LIHAT DATA' untuk test.";
        };
    </script>
</body>
</html>

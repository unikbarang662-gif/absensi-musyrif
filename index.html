<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Musyrif - Final</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #e8f5e9; padding: 15px; }
        .container { max-width: 650px; margin: 0 auto; }
        .card { background: white; border-radius: 16px; padding: 18px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 30px; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .btn-primary { background: #2e7d32; color: white; }
        .btn-danger { background: #d32f2f; color: white; }
        .btn-wa { background: #25D366; color: white; }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0 10px 0; border: 1px solid #ccc; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 8px 5px; text-align: left; border-bottom: 1px solid #eee; }
        .foto { width: 35px; height: 35px; object-fit: cover; border-radius: 6px; cursor: pointer; }
        .header { background: #2e7d32; color: white; padding: 12px; border-radius: 12px; margin-bottom: 12px; position: relative; }
        .logout { position: absolute; top: 8px; right: 12px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 4px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; }
        .tab { display: inline-block; width: 49%; text-align: center; padding: 8px; background: #ddd; border-radius: 30px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
        .tab.active { background: #2e7d32; color: white; }
        .hidden { display: none; }
        .error-msg { background: #ffebee; color: #d32f2f; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: none; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-card { padding: 12px; border-radius: 12px; color: white; text-align: center; }
        .stat-card.green { background: #43a047; }
        .stat-card.blue { background: #1e88e5; }
        .stat-card.orange { background: #fb8c00; }
        .stat-card.red { background: #e53935; }
        .stat-card .val { font-size: 22px; font-weight: bold; }
        .btn-group { display: flex; gap: 8px; }
        .btn-group .btn { flex: 1; margin-top: 0; }
        .perf-item { display: flex; justify-content: space-between; padding: 8px; background: #f5f5f5; border-radius: 8px; margin-bottom: 5px; }
        .badge { padding: 3px 8px; border-radius: 20px; font-size: 10px; font-weight: bold; color: white; }
        .badge.high { background: #4caf50; }
        .badge.medium { background: #ff9800; }
        .badge.low { background: #f44336; }
        .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; color: white; flex-direction: column; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid white; border-top-color: #2e7d32; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 8px 16px; border-radius: 30px; font-size: 12px; z-index: 1500; display: none; }
        @media (max-width: 550px) { .btn-group { flex-direction: column; } .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<div class="loading" id="loading"><div class="spinner"></div><div>Memuat...</div></div>
<div class="toast" id="toast"></div>

<div id="loginSection">
    <div class="container">
        <div class="card">
            <h3 style="text-align:center;">📋 ABSENSI MUSYRIF</h3>
            <div id="loginError" class="error-msg"></div>
            <div>
                <span class="tab active" id="tabMusyrifBtn" onclick="pilihTab('musyrif')">👤 MUSYRIF</span>
                <span class="tab" id="tabAdminBtn" onclick="pilihTab('admin')">🛡️ ADMIN</span>
            </div>
            
            <form id="formMusyrif">
                <select id="inputAsrama">
                    <option value="">-- Pilih Asrama --</option>
                    <option value="hakim">Asrama Al Hakim</option>
                    <option value="fattah">Asrama Al Fattah</option>
                    <option value="karim">Asrama Al Karim</option>
                </select>
                <select id="inputNama" disabled>
                    <option value="">-- Pilih Asrama dulu --</option>
                </select>
                <input type="password" id="inputPassword" placeholder="Password">
                <button type="submit" class="btn btn-primary">🔐 MASUK</button>
            </form>
            
            <form id="formAdmin" class="hidden">
                <input type="password" id="inputPin" placeholder="PIN Admin">
                <button type="submit" class="btn btn-primary">🛡️ MASUK ADMIN</button>
            </form>
        </div>
    </div>
</div>

<div id="appSection" style="display:none">
    <div class="container">
        <div class="header">
            <h4 id="titleApp">Dashboard</h4>
            <p id="infoUser" style="font-size:11px;"></p>
            <button class="logout" onclick="logout()">Keluar</button>
        </div>
        
        <div id="adminArea">
            <div class="card">
                <h4>⚙️ MENU ADMIN</h4>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="refreshData()">🔄 REFRESH</button>
                    <button class="btn btn-wa" onclick="waReminder()">📱 WA REMINDER</button>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card green"><div class="val" id="statHari">0</div><div>HARI INI</div></div>
                <div class="stat-card blue"><div class="val" id="statMinggu">0</div><div>MINGGU INI</div></div>
                <div class="stat-card orange"><div class="val" id="statBulan">0</div><div>BULAN INI</div></div>
                <div class="stat-card red"><div class="val" id="statAktif">0/12</div><div>AKTIF</div></div>
            </div>
            
            <div class="card">
                <h4>📊 PERFORMA MUSYRIF</h4>
                <div id="performaList">Memuat...</div>
            </div>
            
            <div class="card">
                <h4>📜 DATA ABSENSI</h4>
                <div style="overflow-x:auto">
                    <table style="width:100%">
                        <thead><tr><th>Waktu</th><th>Nama</th><th>Asrama</th><th>Kegiatan</th><th>Foto</th></tr></thead>
                        <tbody id="adminTableBody"><tr><td colspan="5">Memuat...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div id="userArea" class="hidden">
            <div class="card">
                <h4>📝 FORM ABSENSI</h4>
                <select id="pilihKegiatan">
                    <option value="">-- Pilih Kegiatan --</option>
                    <option value="Membangunkan Santri">Membangunkan Santri</option>
                    <option value="Pengajian Subuh">Pengajian Subuh</option>
                    <option value="Menggobraki Sekolah">Menggobraki Sekolah</option>
                    <option value="Piket Kamar">Piket Kamar</option>
                    <option value="Pendampingan Dalail">Pendampingan Dalail</option>
                    <option value="Pendampingan Tawasulan">Pendampingan Tawasulan</option>
                    <option value="Muthola'ah">Muthola'ah</option>
                    <option value="Tidur Malam">Tidur Malam</option>
                </select>
                <input type="file" id="pilihFoto" accept="image/*" capture="user">
                <textarea id="isiCatatan" rows="2" placeholder="Catatan..."></textarea>
                <button class="btn btn-primary" onclick="simpanAbsen()" id="btnSimpan">📤 KIRIM ABSENSI</button>
            </div>
            
            <div class="card">
                <h4>📜 RIWAYAT SAYA</h4>
                <div style="overflow-x:auto">
                    <table style="width:100%">
                        <thead><tr><th>Waktu</th><th>Kegiatan</th><th>Foto</th></tr></thead>
                        <tbody id="riwayatBody"><tr><td colspan="3">Memuat...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="modalFoto" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); text-align:center; padding-top:20%; z-index:3000;" onclick="this.style.display='none'">
    <img id="modalImg" style="max-width:90%; max-height:80%; border-radius:10px;">
</div>

<script>
// ==================== 🔴 GANTI URL INI ====================
const API_URL = "https://script.google.com/macros/s/AKfycbynfeoGgZHkKyqrX11mxxY04om6KOWQgMsEaalkOcYqDVzUtJWzWAoNTahj9-qpcAT2/exec";
const PIN_ADMIN = "1234";

const DATA_MUSYRIF = {
    hakim: { nama: "Asrama Al Hakim", pass: { "Ali Mashuri":"ali123", "Ali Zahid":"zahid123", "Reva Dwi":"reva123", "Imam Syafi'i":"imam123" }, kamar: { "Ali Mashuri":"Khondak", "Ali Zahid":"Badar", "Reva Dwi":"Khoibar", "Imam Syafi'i":"Multazam" } },
    fattah: { nama: "Asrama Al Fattah", pass: { "Fattahilah":"fattah123", "Brian Adi Waskito":"brian123", "Babil Yasar":"babil123", "Fahmi":"fahmi123", "Wawan Febi":"wawan123" }, kamar: { "Fattahilah":"Quba", "Brian Adi Waskito":"Bir Ali", "Babil Yasar":"Mina", "Fahmi":"Arofah", "Wawan Febi":"RBQ" } },
    karim: { nama: "Asrama Al Karim", pass: { "Bima Julian":"bima123", "Irfan Khoirul Aziz":"irfan123", "Rizki Alfian":"rizki123" }, kamar: { "Bima Julian":"101", "Irfan Khoirul Aziz":"104", "Rizki Alfian":"203" } }
};

let role = "", userLogin = "", asramaLogin = "", semuaData = [];

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 2500);
}

function showLoading(show) {
    document.getElementById('loading').style.display = show ? 'flex' : 'none';
}

async function fetchData() {
    try {
        showLoading(true);
        const response = await fetch(API_URL);
        const data = await response.json();
        return Array.isArray(data) ? data : [];
    } catch(e) {
        showToast("❌ Error: " + e.message);
        return [];
    } finally {
        showLoading(false);
    }
}

async function postData(data) {
    try {
        showLoading(true);
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        return await response.json();
    } catch(e) {
        showToast("❌ Gagal: " + e.message);
        return null;
    } finally {
        showLoading(false);
    }
}

async function loadData() {
    const result = await fetchData();
    if (result) semuaData = result;
    return result;
}

// LOGIN
document.getElementById('inputAsrama').onchange = function() {
    const as = this.value;
    const selectNama = document.getElementById('inputNama');
    if (as && DATA_MUSYRIF[as]) {
        selectNama.disabled = false;
        selectNama.innerHTML = '<option value="">-- Pilih Musyrif --</option>';
        for (let n in DATA_MUSYRIF[as].pass) {
            selectNama.innerHTML += `<option value="${n}">${n}</option>`;
        }
    } else {
        selectNama.disabled = true;
        selectNama.innerHTML = '<option value="">-- Pilih Asrama dulu --</option>';
    }
};

function pilihTab(tab) {
    const tabMusyrif = document.getElementById('tabMusyrifBtn');
    const tabAdmin = document.getElementById('tabAdminBtn');
    const formMusyrif = document.getElementById('formMusyrif');
    const formAdmin = document.getElementById('formAdmin');
    
    if (tab === 'admin') {
        tabMusyrif.classList.remove('active');
        tabAdmin.classList.add('active');
        formMusyrif.classList.add('hidden');
        formAdmin.classList.remove('hidden');
    } else {
        tabMusyrif.classList.add('active');
        tabAdmin.classList.remove('active');
        formMusyrif.classList.remove('hidden');
        formAdmin.classList.add('hidden');
    }
}

document.getElementById('formMusyrif').onsubmit = async function(e) {
    e.preventDefault();
    const as = document.getElementById('inputAsrama').value;
    const nm = document.getElementById('inputNama').value;
    const ps = document.getElementById('inputPassword').value;
    
    if (as && nm && DATA_MUSYRIF[as] && DATA_MUSYRIF[as].pass[nm] === ps) {
        role = "musyrif";
        userLogin = nm;
        asramaLogin = as;
        await loadData();
        startApp();
    } else {
        const err = document.getElementById('loginError');
        err.innerHTML = "❌ Password salah!";
        err.style.display = 'block';
        setTimeout(() => err.style.display = 'none', 2000);
    }
};

document.getElementById('formAdmin').onsubmit = async function(e) {
    e.preventDefault();
    const pin = document.getElementById('inputPin').value;
    if (pin === PIN_ADMIN) {
        role = "admin";
        await loadData();
        startApp();
    } else {
        const err = document.getElementById('loginError');
        err.innerHTML = "❌ PIN salah! PIN = 1234";
        err.style.display = 'block';
        setTimeout(() => err.style.display = 'none', 2000);
    }
};

function startApp() {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('appSection').style.display = 'block';
    
    if (role === "admin") {
        document.getElementById('titleApp').innerHTML = "🛡️ ADMIN DASHBOARD";
        document.getElementById('infoUser').innerHTML = "Administrator";
        document.getElementById('adminArea').style.display = 'block';
        document.getElementById('userArea').classList.add('hidden');
        renderAdmin();
    } else {
        document.getElementById('titleApp').innerHTML = "📋 ABSENSI MUSYRIF";
        document.getElementById('infoUser').innerHTML = `${userLogin} | ${DATA_MUSYRIF[asramaLogin].nama}`;
        document.getElementById('adminArea').style.display = 'none';
        document.getElementById('userArea').classList.remove('hidden');
        renderUser();
    }
}

function logout() { location.reload(); }

function renderAdmin() {
    const weekAgo = new Date(Date.now() - 7*86400000);
    let html = "";
    for (let a in DATA_MUSYRIF) {
        for (let n in DATA_MUSYRIF[a].pass) {
            let cnt = 0;
            for (let d of semuaData) {
                if (d.Nama === n && new Date(d.Timestamp) >= weekAgo) cnt++;
            }
            let persen = Math.min(100, Math.round(cnt/7*100));
            let statusClass = persen >= 70 ? 'high' : (persen >= 45 ? 'medium' : 'low');
            html += `<div class="perf-item"><div><strong>${n}</strong><br><small>${DATA_MUSYRIF[a].nama}</small></div><span class="badge ${statusClass}">${persen}%</span></div>`;
        }
    }
    document.getElementById('performaList').innerHTML = html || "<p>Belum ada data</p>";
    
    let tableHtml = "";
    for (let d of semuaData.slice().reverse()) {
        tableHtml += `<tr>
            <td>${new Date(d.Timestamp).toLocaleString()}</td>
            <td>${d.Nama}</td>
            <td>${d.Asrama}</td>
            <td>${d.Kegiatan}</td>
            <td>${d.Foto ? `<img src="${d.Foto}" class="foto" onclick="lihatFoto('${d.Foto}')">` : '-'}</td>
        </tr>`;
    }
    document.getElementById('adminTableBody').innerHTML = tableHtml || '<tr><td colspan="5">Belum ada data</td></tr>';
}

function renderUser() {
    const myData = semuaData.filter(d => d.Nama === userLogin);
    let html = "";
    for (let d of myData.slice().reverse()) {
        html += `<tr>
            <td>${new Date(d.Timestamp).toLocaleString()}</td>
            <td>${d.Kegiatan}</td>
            <td>${d.Foto ? `<img src="${d.Foto}" class="foto" onclick="lihatFoto('${d.Foto}')">` : '-'}</td>
        </tr>`;
    }
    document.getElementById('riwayatBody').innerHTML = html || '<tr><td colspan="3">Belum ada data</td></tr>';
}

async function refreshData() {
    await loadData();
    if (role === "admin") renderAdmin();
    else renderUser();
    showToast("✅ Data diperbarui");
}

function waReminder() {
    window.open("https://wa.me/?text=Assalamualaikum%20Musyrif,%20jangan%20lupa%20isi%20absensi%20hari%20ini.");
}

async function simpanAbsen() {
    const kegiatan = document.getElementById('pilihKegiatan').value;
    const fileFoto = document.getElementById('pilihFoto').files[0];
    const catatan = document.getElementById('isiCatatan').value;
    
    if (!kegiatan) { showToast("⚠️ Pilih kegiatan!"); return; }
    if (!fileFoto) { showToast("⚠️ Ambil foto!"); return; }
    
    const btn = document.getElementById('btnSimpan');
    btn.disabled = true;
    btn.innerHTML = "⏳ Menyimpan...";
    
    try {
        const fotoBase64 = await bacaFile(fileFoto);
        const result = await postData({
            timestamp: new Date().toISOString(),
            nama: userLogin,
            asrama: DATA_MUSYRIF[asramaLogin].nama,
            kamar: DATA_MUSYRIF[asramaLogin].kamar[userLogin],
            kegiatan: kegiatan,
            foto: fotoBase64,
            catatan: catatan
        });
        
        if (result && result.success) {
            await loadData();
            renderUser();
            showToast("✅ Absensi tersimpan!");
            document.getElementById('pilihKegiatan').value = "";
            document.getElementById('pilihFoto').value = "";
            document.getElementById('isiCatatan').value = "";
        } else {
            showToast("❌ Gagal: " + (result?.error || "Unknown"));
        }
    } catch(err) {
        showToast("❌ Error: " + err.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = "📤 KIRIM ABSENSI";
    }
}

function bacaFile(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
    });
}

function lihatFoto(src) {
    document.getElementById('modalImg').src = src;
    document.getElementById('modalFoto').style.display = 'block';
}

console.log("Aplikasi siap! Jika masih error, cek URL API di baris 288");
</script>
</body>
</html>

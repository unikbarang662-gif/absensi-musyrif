<script>
    // ================= KONFIGURASI =================
    // ⚠️ PASTIKAN URL INI ADALAH URL DARI DEPLOYMENT TERBARU ANDA
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbypJaP2XV8R8c2YhFHDLoUcXo5TyTZIiSy6Vh-pLxBDax_xEVGGVADnrdkXpWY4c6xQ/exec"; 
    const ADMIN_PIN = "1234";
    const WA_ADMIN = "6285893588373";
    
    const MUSYRIF_BY_ASMARA = {
        "al-hakim": { name: "Asrama Al Hakim", musyrif: { "Ali Mashuri": { pass: "ali123", rooms: ["Khondak", "Uhud"] }, "Ali Zahid": { pass: "zahid123", rooms: ["Badar"] }, "Reva Dwi": { pass: "reva123", rooms: ["Khoibar"] }, "Imam Syafi'i": { pass: "imam123", rooms: ["Multazam"] } } },
        "al-fattah": { name: "Asrama Al Fattah", musyrif: { "Fattahilah": { pass: "fattah123", rooms: ["Quba", "Mekkah", "Madinah", "Raudhoh"] }, "Brian Adi Waskito": { pass: "brian123", rooms: ["Bir'Ali", "Zam-zam", "Tan'im", "Thoif"] }, "Babil Yasar": { pass: "babil123", rooms: ["Mina", "Hudaibiyah", "Jeddah", "Ji'ronah"] }, "Fahmi": { pass: "fahmi123", rooms: ["Arofah"] }, "Wawan Febi": { pass: "wawan123", rooms: ["RBQ"] } } },
        "al-karim": { name: "Asrama Al Karim", musyrif: { "Bima Julian": { pass: "bima123", rooms: ["101", "102", "103"] }, "Irfan Khoirul Aziz": { pass: "irfan123", rooms: ["104", "201", "202"] }, "Rizki Alfian": { pass: "rizki123", rooms: ["203", "204"] } } }
    };

    const JOBS = [
        { n: "Membangunkan Santri", t: "03:45", tf: "03:30", e: "04:30", days: [0,1,2,3,4,5,6] },
        { n: "Pengajian Ba'da Subuh", t: "05:00", e: "05:45", days: [0,1,2,3,4,5,6] },
        { n: "Menggobraki Berangkat Sekolah Formal", t: "06:30", e: "07:30", days: [0,1,2,3,4,5,6] },
        { n: "Menggobraki Piket Kamar & Persiapan Maghrib", t: "16:30", e: "17:30", days: [0,1,2,3,4,5,6] },
        { n: "Mengobraki dan Mendampingi Dalail", t: "18:00", e: "19:30", days: [1] },
        { n: "Mengobraki dan Mendampingi Tawasulan", t: "21:00", e: "23:30", days: [4] },
        { n: "Pendampingan Jam Muthola'ah", t: "19:30", e: "20:30", days: [0,2,3,6] },
        { n: "Menertibkan Jam Tidur", t: "21:30", e: "22:30", days: [0,1,2,3,4,5,6] }
    ];

    let role = null, user = null, data = [], myChart = null, adminChart = null, currentAsrama = null;
    
    function switchTab(t) {
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        document.querySelector(`.tab-btn:nth-child(${t==='admin'?2:1})`).classList.add('active');
        document.getElementById('musyrif-form').style.display = t==='admin'?'none':'block';
        document.getElementById('admin-form').style.display = t==='admin'?'block':'none';
        document.getElementById('login-error').style.display='none';
    }

    function updateMusyrifSelect() {
        const asrama = document.getElementById('m-asrama').value;
        const musyrifSelect = document.getElementById('m-name');
        musyrifSelect.innerHTML = '<option value="">-- Pilih Musyrif --</option>';
        if (asrama && MUSYRIF_BY_ASMARA[asrama]) {
            musyrifSelect.disabled = false;
            Object.keys(MUSYRIF_BY_ASMARA[asrama].musyrif).forEach(name => {
                musyrifSelect.innerHTML += `<option value="${name}">${name}</option>`;
            });
        } else {
            musyrifSelect.disabled = true;
            musyrifSelect.innerHTML = '<option value="">-- Pilih Asrama Terlebih Dahulu --</option>';
        }
    }
    
    function waForgot() {
        const n = document.getElementById('m-name').value;
        if(!n) return alert('Pilih nama dulu!');
        window.open(`https://wa.me/${WA_ADMIN}?text=${encodeURIComponent(`Halo Admin, saya ${n} lupa password absensi.`)}`);
    }

    document.getElementById('musyrif-form').onsubmit = e => {
        e.preventDefault();
        const asrama = document.getElementById('m-asrama').value;
        const n = document.getElementById('m-name').value;
        const p = document.getElementById('m-pass').value;
        if (MUSYRIF_BY_ASMARA[asrama] && MUSYRIF_BY_ASMARA[asrama].musyrif[n] && MUSYRIF_BY_ASMARA[asrama].musyrif[n].pass === p) {
            login(n, MUSYRIF_BY_ASMARA[asrama].musyrif[n].rooms.join(', '), 'musyrif', asrama);
        } else { showError('Nama atau password salah!'); }
    };

    document.getElementById('admin-form').onsubmit = e => {
        e.preventDefault();
        if(document.getElementById('a-pin').value === ADMIN_PIN) login('Admin', 'Full Access', 'admin', null);
        else showError('PIN Admin salah!');
    };

    function login(name, room, r, asrama) {
        role = r; user = {name, room}; currentAsrama = asrama;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('app-title').textContent = r==='admin' ? '🛡️ Dashboard Admin' : '📋 Absensi Musyrif';
        document.getElementById('user-label').textContent = `${name} | ${room} ${asrama ? '| '+MUSYRIF_BY_ASMARA[asrama].name : ''}`;
        if(r==='admin') {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('musyrif-view').style.display = 'none';
        } else {
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('musyrif-view').style.display = 'block';
        }
        loadData(); renderSched(); updJobs();
    }
    function showError(m) { const e=document.getElementById('login-error'); e.textContent=m; e.style.display='block'; setTimeout(()=>e.style.display='none',3000); }

    function renderSched() {
        const now = new Date(), nm = now.getHours()*60+now.getMinutes(), day = now.getDay();
        document.getElementById('sched-grid').innerHTML = JOBS.filter(j => j.days.includes(day)).map(j => {
            const s = j.tf ? j.tf : j.t;
            const [sh,sm]=s.split(':').map(Number), [eh,em]=j.e.split(':').map(Number);
            const st=sh*60+sm, et=eh*60+em;
            const cls = nm>=st && nm<=et ? 'active' : nm>et ? 'done' : '';
            const txt = cls==='active' ? '🟢 Berjalan' : cls==='done' ? '✅ Selesai' : '⏳ Belum';
            return `<div class="schedule-item ${cls}"><div class="time">${s} - ${j.e}</div><div style="margin:4px 0;font-weight:500;">${j.n}</div><div style="font-size:0.8rem;color:var(--text-light);">${txt}</div></div>`;
        }).join('');
    }
    
    function updJobs() {
        const now = new Date(), nm = now.getHours()*60+now.getMinutes(), day = now.getDay();
        const sel = document.getElementById('act-select'), msg = document.getElementById('act-msg');
        sel.innerHTML = '<option value="">-- Pilih Kegiatan --</option>';
        
        JOBS.filter(j => j.days.includes(day)).forEach(j => {
            const s = j.tf ? j.tf : j.t;
            const o = document.createElement('option');
            o.value = j.n;
            o.textContent = `${j.n} (${s}-${j.e})`;
            o.selected = true;
            sel.appendChild(o);
        });
        
        msg.textContent = '✅ Pilih kegiatan yang tersedia';
        msg.style.color = 'var(--success)';
    }

    function getStats(nm) {
        const my = data.filter(d=>d['Nama Musyrif']===nm);
        const td = new Date().toDateString(), wk = Date.now()-7*864e5, mo = Date.now()-30*864e5;
        const d = my.some(x=>new Date(x.Timestamp).toDateString()===td)?1:0;
        const w = my.filter(x=>new Date(x.Timestamp)>=wk).length;
        const m = my.filter(x=>new Date(x.Timestamp)>=mo).length;
        return { d:Math.min(100,d*100), w:Math.min(100,Math.round(w/7*100)), m:Math.min(100,Math.round(m/30*100)), raw: { daily: d, weekly: w, monthly: m } };
    }

    function getAssessment(percentage) {
        if (percentage >= 70) return { grade: 'A', status: 'Sangat Aktif', class: 'active', color: '#388e3c' };
        if (percentage >= 50) return { grade: 'B', status: 'Aktif', class: 'warning', color: '#f57c00' };
        if (percentage >= 30) return { grade: 'C', status: 'Cukup', class: '', color: '#1976d2' };
        return { grade: 'D', status: 'Kurang', class: 'inactive', color: '#d32f2f' };
    }

    function renderChart() {
        const ctx = document.getElementById('attendanceChart').getContext('2d');
        const my = data.filter(d=>d['Nama Musyrif']===user.name);
        const days = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
        const chartData = [0,0,0,0,0,0,0];
        my.forEach(d => { const date = new Date(d.Timestamp); chartData[date.getDay()]++; });
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: days,
                datasets: [{
                    label: 'Jumlah Absensi',
                     chartData,
                    backgroundColor: ['rgba(46,125,50,0.8)','rgba(76,175,80,0.8)','rgba(139,195,74,0.8)','rgba(205,220,57,0.8)','rgba(255,193,7,0.8)','rgba(255,152,0,0.8)','rgba(244,67,54,0.8)'],
                    borderWidth: 2,
                    borderRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
            }
        });
    }

    function showStats() {
        const s = getStats(user.name);
        document.getElementById('stats-panel').style.display='block';
        const set = (id,val) => { document.getElementById(id).textContent=val+'%'; const b=document.getElementById(id.replace('ms','mb')); b.style.width=val+'%'; b.className='fill'+(val<40?' crit':val<70?' low':''); };
        set('ms-d',s.d); set('ms-w',s.w); set('ms-m',s.m);
        renderChart();
    }

    function updAdminStats() {
        const td=new Date().toDateString(), wk=Date.now()-7*864e5, mo=Date.now()-30*864e5;
        document.getElementById('s-today').textContent = data.filter(x=>new Date(x.Timestamp).toDateString()===td).length;
        document.getElementById('s-week').textContent = data.filter(x=>new Date(x.Timestamp)>=wk).length;
        document.getElementById('s-month').textContent = data.filter(x=>new Date(x.Timestamp)>=mo).length;
        const act = new Set(data.filter(x=>new Date(x.Timestamp)>=wk).map(x=>x['Nama Musyrif']));
        document.getElementById('s-active').textContent = `${act.size}/12`;
        const pc = document.getElementById('perf-container'); pc.innerHTML='';
        Object.keys(MUSYRIF_BY_ASMARA).forEach(asramaKey => {
            const asrama = MUSYRIF_BY_ASMARA[asramaKey];
            Object.keys(asrama.musyrif).forEach(n => {
                const s = getStats(n); 
                const w = s.w; 
                const assessment = getAssessment(w);
                pc.innerHTML += `<div class="perf-item ${assessment.class}"><div><strong>${n}</strong><br><small>${asrama.name} - ${asrama.musyrif[n].rooms.join(', ')}</small></div><span class="badge ${assessment.class}">${assessment.status} (${w}%)</span></div>`;
            });
        });
        const ctx2 = document.getElementById('adminChart').getContext('2d');
        const names=[], perfData=[], colors=[];
        Object.keys(MUSYRIF_BY_ASMARA).forEach(asramaKey => {
            Object.keys(MUSYRIF_BY_ASMARA[asramaKey].musyrif).forEach(n => {
                names.push(n); 
                const w = getStats(n).w; 
                perfData.push(w); 
                colors.push(getAssessment(w).color);
            });
        });
        if(adminChart) adminChart.destroy();
        adminChart = new Chart(ctx2, {
            type: 'bar',
            data: {
                labels: names,
                datasets: [{
                    label: 'Kehadiran Minggu Ini (%)',
                     perfData,
                    backgroundColor: colors,
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true, max: 100 } }
            }
        });
    }

    async function loadData() {
        const btnRefresh = document.getElementById('btn-refresh');
        if(btnRefresh) {
            btnRefresh.disabled = true;
            btnRefresh.textContent = '⏳ Loading...';
        }
        
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000);
            
            const res = await fetch(GOOGLE_SCRIPT_URL, { 
                method: 'GET',
                signal: controller.signal,
                mode: 'cors' // Penting untuk CORS
            });
            clearTimeout(timeoutId);
            
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            
            data = await res.json();
            
            if (role === 'admin') { 
                updAdminStats(); 
                renderAdminTable(); 
            } else { 
                renderMyTable(); 
                showStats(); 
            }
            
            console.log('Data loaded:', data.length);
        } catch (e) {
            console.error('Error:', e);
            alert('❌ Gagal koneksi ke Google Script.\n\nPastikan:\n1. URL Google Script sudah benar dan diakhiri /exec\n2. Deploy sebagai Web App dengan akses "Anyone"\n3. Internet stabil\n4. Google Script sudah di-deploy ulang sebagai "New Version"');
        } finally {
            if(btnRefresh) {
                btnRefresh.disabled = false;
                btnRefresh.textContent = '🔄 Refresh Data';
            }
        }
    }
    
    function renderAdminTable() {
        if (data.length === 0) { 
            document.getElementById('admin-tbody').innerHTML = '<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text-light);">Belum ada data absensi</td></tr>'; 
            return; 
        }
        document.getElementById('admin-tbody').innerHTML = data.slice().reverse().map(d=>{
            const asramaName = d.Asrma || (d.asrama || '-');
            return `<tr>
                <td>${new Date(d.Timestamp).toLocaleString()}</td>
                <td>${d['Nama Musyrif']||'-'}</td>
                <td>${asramaName}</td>
                <td>${d.Kamar||'-'}</td>
                <td>${d.Kegiatan||'-'}</td>
                <td>${d.Foto?`<img src="${d.Foto}" class="photo-thumb" onclick="viewImg('${d.Foto.replace(/'/g,"\\'")}')"`:'-'}</td>
                <td><button class="btn btn-danger" style="padding:4px 8px;font-size:0.7rem;" onclick="delRow('${d.Timestamp}','${d['Nama Musyrif']}')">Hapus</button></td>
            </tr>`;
        }).join('');
    }
    
    function renderMyTable() {
        const my = data.filter(d=>d['Nama Musyrif']===user.name).reverse();
        if (my.length === 0) { document.getElementById('my-tbody').innerHTML = '<tr><td colspan="3" style="text-align:center;padding:15px;">Belum ada riwayat</td></tr>'; return; }
        document.getElementById('my-tbody').innerHTML = my.map(d=>`<tr><td>${new Date(d.Timestamp).toLocaleString()}</td><td>${d.Kegiatan}</td><td>${d.Foto?`<img src="${d.Foto}" class="photo-thumb" onclick="viewImg('${d.Foto.replace(/'/g,"\\'")}')"`:'-'}</td></tr>`).join('');
    }
    
    function viewImg(s) { document.getElementById('p-img').src=s; document.getElementById('p-modal').classList.add('active'); }

    document.getElementById('absen-form').onsubmit = async e => {
        e.preventDefault();
        const act = document.getElementById('act-select').value;
        const photo = document.getElementById('photo-in').files[0];
        if (!act) { alert('⚠️ Pilih kegiatan terlebih dahulu!'); return; }
        if (!photo) { alert('⚠️ Upload foto kegiatan menggunakan kamera depan!'); return; }
        
        const btn = document.getElementById('sub-btn'); 
        const originalText = btn.textContent;
        btn.disabled=true; 
        btn.textContent='⏳ Mengirim...';
        
        try {
            const b64 = await new Promise((r,j)=>{
                const rd=new FileReader();
                rd.onload=()=>r(rd.result);
                rd.onerror=j;
                rd.readAsDataURL(photo);
            });
            
            const payload = {
                musyrif: user.name,
                asrama: currentAsrama ? MUSYRIF_BY_ASMARA[currentAsrama].name : '',
                kamar: user.room,
                kegiatan: act,
                foto: b64,
                catatan: document.getElementById('notes').value
            };
            
            const res = await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload),
                mode: 'cors' // Penting untuk CORS
            });
            
            const result = await res.json();
            
            if (result.result === 'success') {
                alert('✅ Absensi berhasil dikirim dan tersimpan di Google Sheets!');
                document.getElementById('absen-form').reset();
                loadData();
                if(role === 'musyrif') showStats();
            } else {
                throw new Error(result.message || 'Gagal menyimpan data');
            }
        } catch(err) {
            console.error('Error:', err);
            alert('❌ Gagal mengirim data: ' + err.message + '\n\nPastikan Google Script sudah di-deploy dengan akses "Anyone" dan "New Version"');
        } finally {
            btn.disabled=false; 
            btn.textContent=originalText;
        }
    };

    async function delRow(ts, nm) {
        if(!confirm(`Hapus data ${nm}?\n${ts}`)) return;
        
        try {
            // Menggunakan parameter query untuk delete agar lebih mudah ditangani oleh script sederhana
            const url = `${GOOGLE_SCRIPT_URL}?action=delete&timestamp=${encodeURIComponent(ts)}&musyrif=${encodeURIComponent(nm)}`;
            const res = await fetch(url, {
                method: 'POST', // Google Script kadang butuh POST untuk trigger even jika pakai query param
                mode: 'cors'
            });
            
            const result = await res.json();
            
            if (result.result === 'success') {
                alert('✅ Data berhasil dihapus');
                loadData();
            } else {
                throw new Error(result.message);
            }
        } catch (err) {
            alert('❌ Gagal menghapus  ' + err.message);
        }
    }
    
    function generatePDF() {
        if(!data.length) {
            alert('⚠️ Tidak ada data untuk laporan!');
            return;
        }
        document.getElementById('report-section').style.display = 'block';
        document.getElementById('r-date').textContent = new Date().toLocaleString('id-ID');
        let html = '', totalAbsen = 0;
        const wk = new Date(Date.now() - 7*864e5);
        
        Object.keys(MUSYRIF_BY_ASMARA).forEach((asramaKey, idx) => {
            const asrama = MUSYRIF_BY_ASMARA[asramaKey];
            const asramaData = data.filter(d => {
                const dAsrama = d.Asrma || d.asrama || '';
                return dAsrama === asrama.name && new Date(d.Timestamp) >= wk;
            });
            totalAbsen += asramaData.length;
            
            html += `<div class="asrama-section">
                <h3>${asrama.name}</h3>
                <table class="assessment-table">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Nama Musyrif</th>
                            <th>Kamar</th>
                            <th>Jumlah Absen</th>
                            <th>Persentase</th>
                            <th>Status</th>
                            <th>Penilaian</th>
                        </tr>
                    </thead>
                    <tbody>`;
            
            Object.keys(asrama.musyrif).forEach((name, mIdx) => {
                const musyrifData = asramaData.filter(d => d['Nama Musyrif'] === name);
                const count = musyrifData.length;
                const percentage = Math.min(100, Math.round((count/7)*100));
                const assessment = getAssessment(percentage);
                
                html += `<tr>
                    <td>${mIdx+1}</td>
                    <td><strong>${name}</strong></td>
                    <td>${asrama.musyrif[name].rooms.join(', ')}</td>
                    <td>${count} kali</td>
                    <td>${percentage}%</td>
                    <td><span style="background:${assessment.color};color:white;padding:3px 8px;border-radius:12px;font-size:0.85rem;">${assessment.status}</span></td>
                    <td><strong>Grade ${assessment.grade}</strong></td>
                </tr>`;
            });
            
            html += `</tbody></table></div>`;
        });
        
        document.getElementById('r-absen').textContent = totalAbsen;
        document.getElementById('asrama-reports').innerHTML = html;
        
        setTimeout(() => {
            const { jsPDF } = window.jspdf;
            html2canvas(document.getElementById('report-section'), { scale: 2, useCORS: true }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                pdf.save(`Laporan_Kinerja_Per_Asrama_${new Date().toISOString().slice(0,10)}.pdf`);
                document.getElementById('report-section').style.display = 'none';
                alert('✅ Laporan PDF berhasil diunduh!');
            }).catch(err => { 
                alert('❌ Gagal generate PDF: ' + err.message); 
                document.getElementById('report-section').style.display = 'none'; 
            });
        }, 1000);
    }
    
    function generateIndividualPDF() {
        const musyrifName = prompt('Masukkan nama musyrif yang akan dicetak laporannya:\n\nContoh: Ali Mashuri, Ali Zahid, Reva Dwi, Imam Syafi\'i');
        if (!musyrifName || musyrifName.trim() === '') return;
        
        const searchName = musyrifName.trim();
        const musyrifData = data.filter(d => {
            const dataName = (d['Nama Musyrif'] || '').trim();
            return dataName === searchName;
        });
        
        if (!musyrifData.length) {
            let availableNames = [...new Set(data.map(d => d['Nama Musyrif']))].filter(n => n).join(', ');
            alert(`❌ Data absensi untuk "${searchName}" tidak ditemukan!\n\nMusyrif yang tersedia:\n${availableNames || 'Belum ada data'}`);
            return;
        }
        
        document.getElementById('individual-report-section').style.display = 'block';
        document.getElementById('ind-name').textContent = searchName;
        document.getElementById('ind-date').textContent = new Date().toLocaleString('id-ID');
        
        let foundAsrama = '';
        let foundRooms = '';
        Object.keys(MUSYRIF_BY_ASMARA).forEach(key => {
            if (MUSYRIF_BY_ASMARA[key].musyrif[searchName]) {
                foundAsrama = MUSYRIF_BY_ASMARA[key].name;
                foundRooms = MUSYRIF_BY_ASMARA[key].musyrif[searchName].rooms.join(', ');
            }
        });
        
        document.getElementById('ind-asrama').textContent = foundAsrama || '-';
        document.getElementById('ind-kamar').textContent = foundRooms || musyrifData[0].Kamar || '-';
        
        const stats = getStats(searchName);
        const assessment = getAssessment(stats.w);
        
        let html = `<div style="margin: 30px 0;">
            <h3 style="color: var(--primary); margin-bottom: 15px;">📊 Ringkasan Kehadiran</h3>
            <table class="assessment-table">
                <tr><th>Periode</th><th>Jumlah Absen</th><th>Persentase</th><th>Status</th></tr>
                <tr><td>Harian</td><td>${stats.raw.daily} kali</td><td>${stats.d}%</td><td>${stats.d >= 70 ? '✅' : '⚠️'}</td></tr>
                <tr><td>Mingguan</td><td>${stats.raw.weekly} kali</td><td>${stats.w}%</td><td><span style="background:${assessment.color};color:white;padding:3px 8px;border-radius:12px;">${assessment.status}</span></td></tr>
                <tr><td>Bulanan</td><td>${stats.raw.monthly} kali</td><td>${stats.m}%</td><td>${stats.m >= 70 ? '✅' : '⚠️'}</td></tr>
            </table>
        </div>
        
        <div style="margin: 30px 0;">
            <h3 style="color: var(--primary); margin-bottom: 15px;">📜 Riwayat Absensi</h3>
            <table class="assessment-table">
                <thead><tr><th>No</th><th>Tanggal</th><th>Waktu</th><th>Kegiatan</th><th>Catatan</th></tr></thead>
                <tbody>`;
        
        musyrifData.slice().reverse().forEach((d, idx) => {
            const date = new Date(d.Timestamp);
            html += `<tr>
                <td>${idx+1}</td>
                <td>${date.toLocaleDateString('id-ID')}</td>
                <td>${date.toLocaleTimeString('id-ID')}</td>
                <td>${d.Kegiatan}</td>
                <td>${d.Catatan || '-'}</td>
            </tr>`;
        });
        
        html += `</tbody></table></div>`;
        
        document.getElementById('individual-content').innerHTML = html;
        
        setTimeout(() => {
            const { jsPDF } = window.jspdf;
            html2canvas(document.getElementById('individual-report-section'), { scale: 2, useCORS: true }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                pdf.save(`Laporan_Individu_${searchName.replace(/\s+/g, '_')}_${new Date().toISOString().slice(0,10)}.pdf`);
                document.getElementById('individual-report-section').style.display = 'none';
                alert('✅ Laporan PDF Individu berhasil diunduh!');
            }).catch(err => { 
                alert('❌ Gagal generate PDF: ' + err.message); 
                document.getElementById('individual-report-section').style.display = 'none'; 
            });
        }, 1000);
    }
    
    function waReminder() {
        const td=new Date().toDateString(), miss=[];
        Object.keys(MUSYRIF_BY_ASMARA).forEach(key => {
            Object.keys(MUSYRIF_BY_ASMARA[key].musyrif).forEach(n => {
                if (!data.some(d=>d['Nama Musyrif']===n && new Date(d.Timestamp).toDateString()===td)) miss.push(n);
            });
        });
        if(!miss.length) return alert('✅ Semua sudah absen!');
        window.open(`https://wa.me/?text=${encodeURIComponent(`*REMINDER ABSENSI*\nYth. ${miss.join(', ')},\nAnda belum absen hari ini.`)}`);
    }

    setInterval(()=>{if(role){renderSched();updJobs();}}, 60000);
</script>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Musyrif</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
        body{background:#f5f5f5;padding:20px}
        #login{position:fixed;top:0;left:0;width:100%;height:100%;background:#2e7d32;display:flex;justify-content:center;align-items:center}
        .box{background:white;padding:30px;border-radius:10px;width:90%;max-width:400px}
        h2{text-align:center;color:#2e7d32;margin-bottom:20px}
        input,select{width:100%;padding:10px;margin:10px 0;border:1px solid #ddd;border-radius:5px}
        button{width:100%;padding:12px;background:#2e7d32;color:white;border:none;border-radius:5px;cursor:pointer;margin:5px 0}
        button:hover{background:#1b5e20}
        #main{display:none;max-width:1000px;margin:0 auto}
        header{background:#2e7d32;color:white;padding:20px;border-radius:10px;margin-bottom:20px;text-align:center}
        .card{background:white;padding:20px;border-radius:10px;margin-bottom:20px}
        table{width:100%;border-collapse:collapse}
        th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left}
        th{background:#f5f5f5}
        .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
        .stat{background:#2e7d32;color:white;padding:15px;border-radius:5px;text-align:center}
        .stat h3{font-size:24px}
        .error{background:#ffebee;color:#c62828;padding:10px;border-radius:5px;margin:10px 0;display:none}
    </style>
</head>
<body>
    <div id="login">
        <div class="box">
            <h2>📋 Absensi Musyrif</h2>
            <div id="errorMsg" class="error"></div>
            <form id="loginForm">
                <select id="userName" required>
                    <option value="">-- Pilih Nama --</option>
                    <option value="Ali Mashuri">Ali Mashuri</option>
                    <option value="Reva Dwi">Reva Dwi</option>
                    <option value="Ali Zahid">Ali Zahid</option>
                    <option value="Imam Syafi'i">Imam Syafi'i</option>
                </select>
                <input type="password" id="userPass" placeholder="Password" required>
                <button type="submit">🔐 Masuk</button>
            </form>
            <button onclick="alert('Hubungi Admin: 0858-9358-8373')" style="background:#25D366">💬 Lupa Password</button>
        </div>
    </div>

    <div id="main">
        <header>
            <h1>Dashboard</h1>
            <p id="userInfo"></p>
            <button onclick="location.reload()" style="position:absolute;top:20px;right:20px;width:auto;background:rgba(255,255,255,0.2)">Keluar</button>
        </header>

        <div id="adminPanel" style="display:none">
            <div class="card">
                <h2>📊 Statistik</h2>
                <div class="stats">
                    <div class="stat"><h3 id="today">0</h3><small>Hari Ini</small></div>
                    <div class="stat"><h3 id="week">0</h3><small>Minggu Ini</small></div>
                    <div class="stat"><h3 id="month">0</h3><small>Bulan Ini</small></div>
                    <div class="stat"><h3 id="total">0</h3><small>Total</small></div>
                </div>
            </div>
            <div class="card">
                <h2>📜 Data Absensi</h2>
                <button onclick="loadData()" style="margin-bottom:10px">🔄 Refresh</button>
                <table id="dataTable">
                    <thead><tr><th>Waktu</th><th>Nama</th><th>Kegiatan</th><th>Catatan</th></tr></thead>
                    <tbody id="tableBody"><tr><td colspan="4">Klik Refresh</td></tr></tbody>
                </table>
            </div>
        </div>

        <div id="musyrifPanel" style="display:none">
            <div class="card">
                <h2>📝 Input Absensi</h2>
                <form id="absenForm">
                    <select id="kegiatan" required>
                        <option value="">-- Pilih Kegiatan --</option>
                        <option>Membangunkan Santri</option>
                        <option>Pengajian Ba'da Subuh</option>
                        <option>Menggobraki Sekolah</option>
                        <option>Menggobraki Piket</option>
                        <option>Mendampingi Dalail</option>
                        <option>Pendampingan Muthola'ah</option>
                        <option>Mendampingi Tawasulan</option>
                        <option>Menertibkan Jam Tidur</option>
                    </select>
                    <textarea id="catatan" placeholder="Catatan (opsional)" style="width:100%;padding:10px;margin:10px 0;border:1px solid #ddd;border-radius:5px;height:80px"></textarea>
                    <button type="submit">✅ Kirim Absensi</button>
                </form>
            </div>
            <div class="card">
                <h2>📜 Riwayat Saya</h2>
                <table id="myTable">
                    <thead><tr><th>Waktu</th><th>Kegiatan</th></tr></thead>
                    <tbody id="myBody"><tr><td colspan="2">Belum ada data</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbxZf_fvTjMpEIGdBhoNkkL23Af3IU8tCUI1/exec";
        const USERS = {
            "Ali Mashuri": "ali123",
            "Reva Dwi": "reva123",
            "Ali Zahid": "zahid123",
            "Imam Syafi'i": "imam123"
        };
        let currentUser = null;
        let allData = [];

        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            const name = document.getElementById('userName').value;
            const pass = document.getElementById('userPass').value;
            
            if (USERS[name] && USERS[name] === pass) {
                currentUser = name;
                document.getElementById('login').style.display = 'none';
                document.getElementById('main').style.display = 'block';
                document.getElementById('userInfo').textContent = name;
                
                if (name === 'Admin') {
                    document.getElementById('adminPanel').style.display = 'block';
                    loadData();
                } else {
                    document.getElementById('musyrifPanel').style.display = 'block';
                    loadMyData();
                }
            } else {
                const err = document.getElementById('errorMsg');
                err.textContent = 'Nama atau password salah!';
                err.style.display = 'block';
                setTimeout(() => err.style.display = 'none', 3000);
            }
        };

        document.getElementById('absenForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            btn.textContent = 'Mengirim...';
            btn.disabled = true;

            try {
                const data = {
                    nama: currentUser,
                    kegiatan: document.getElementById('kegiatan').value,
                    catatan: document.getElementById('catatan').value,
                    waktu: new Date().toISOString()
                };

                const response = await fetch(GOOGLE_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    alert('✅ Absensi berhasil!');
                    e.target.reset();
                    loadMyData();
                } else {
                    alert('❌ Gagal: ' + (result.message || 'Unknown error'));
                }
            } catch (error) {
                alert('❌ Error: ' + error.message);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        };

        async function loadData() {
            try {
                const response = await fetch(GOOGLE_URL);
                allData = await response.json();
                
                document.getElementById('total').textContent = allData.length;
                
                const today = new Date().toDateString();
                const weekAgo = new Date(Date.now() - 7*86400000);
                const monthAgo = new Date(Date.now() - 30*86400000);
                
                document.getElementById('today').textContent = allData.filter(d => new Date(d.waktu).toDateString() === today).length;
                document.getElementById('week').textContent = allData.filter(d => new Date(d.waktu) >= weekAgo).length;
                document.getElementById('month').textContent = allData.filter(d => new Date(d.waktu) >= monthAgo).length;
                
                const tbody = document.getElementById('tableBody');
                if (allData.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4">Belum ada data</td></tr>';
                } else {
                    tbody.innerHTML = allData.slice().reverse().map(d => `
                        <tr>
                            <td>${new Date(d.waktu).toLocaleString('id-ID')}</td>
                            <td>${d.nama || '-'}</td>
                            <td>${d.kegiatan || '-'}</td>
                            <td>${d.catatan || '-'}</td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                alert('❌ Gagal load data: ' + error.message);
            }
        }

        function loadMyData() {
            const myData = allData.filter(d => d.nama === currentUser);
            const tbody = document.getElementById('myBody');
            
            if (myData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2">Belum ada absensi</td></tr>';
            } else {
                tbody.innerHTML = myData.slice().reverse().map(d => `
                    <tr>
                        <td>${new Date(d.waktu).toLocaleString('id-ID')}</td>
                        <td>${d.kegiatan}</td>
                    </tr>
                `).join('');
            }
        }
    </script>
</body>
</html>

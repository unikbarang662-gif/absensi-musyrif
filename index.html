<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Musyrif</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary:#2e7d32; --bg:#f5f7f5; --card:#fff; --text:#1b1b1b; --border:#e0e0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 16px; }
        #login { position: fixed; inset: 0; background: linear-gradient(135deg, var(--primary), #4caf50); display: flex; align-items: center; justify-content: center; z-index: 999; }
        .box { background: var(--card); padding: 24px; border-radius: 16px; width: 90%; max-width: 400px; }
        .tabs { display: flex; margin-bottom: 16px; border-bottom: 2px solid var(--border); }
        .tab { flex: 1; padding: 10px; border: none; background: none; font-weight: 600; cursor: pointer; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .form { margin-bottom: 12px; }
        .form label { display: block; margin-bottom: 4px; font-weight: 500; }
        .form input, .form select { width: 100%; padding: 10px; border: 2px solid var(--border); border-radius: 8px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--primary); color: #fff; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .btn:disabled { opacity: 0.6; }
        .err { background: #ffebee; color: #d32f2f; padding: 8px; border-radius: 6px; margin-bottom: 10px; display: none; text-align: center; }
        #app { display: none; max-width: 1000px; margin: 0 auto; }
        header { background: linear-gradient(135deg, var(--primary), #4caf50); color: #fff; padding: 16px; border-radius: 12px; margin-bottom: 16px; position: relative; }
        .logout { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .card { background: var(--card); padding: 16px; border-radius: 12px; margin-bottom: 16px; }
        .card h2 { margin-bottom: 12px; color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
        .stat { background: linear-gradient(135deg, var(--primary), #4caf50); color: #fff; padding: 12px; border-radius: 10px; text-align: center; }
        .stat .v { font-size: 1.5rem; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #f1f1f1; }
        .thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; }
        .sched { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .sched-item { padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: #fafafa; }
        .time { font-weight: bold; color: var(--primary); }
        @media(max-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div id="login">
        <div class="box">
            <div style="text-align: center; margin-bottom: 16px;">
                <h2>📋 Absensi Musyrif</h2>
                <p style="color: #666;">Pilih akses</p>
            </div>
            <div class="tabs">
                <button class="tab active" onclick="sw('m')">👤 Musyrif</button>
                <button class="tab" onclick="sw('a')">🛡️ Admin</button>
            </div>
            <div id="err" class="err"></div>
            
            <!-- Form Musyrif -->
            <form id="fm">
                <div class="form">
                    <label>Asrama</label>
                    <select id="as" required onchange="um()">
                        <option value="">-- Pilih --</option>
                        <option value="al-hakim">Al Hakim</option>
                        <option value="al-fattah">Al Fattah</option>
                        <option value="al-karim">Al Karim</option>
                    </select>
                </div>
                <div class="form">
                    <label>Nama</label>
                    <select id="nm" required disabled><option value="">-- Pilih Asrama --</option></select>
                </div>
                <div class="form">
                    <label>Password</label>
                    <input type="password" id="pw" required>
                </div>
                <button class="btn">🔐 Masuk</button>
                <button type="button" class="btn" style="background: #25D366;" onclick="wf()">💬 Lupa Password</button>
            </form>
            
            <!-- Form Admin -->
            <form id="fa" style="display: none;">
                <div class="form">
                    <label>PIN Admin</label>
                    <input type="password" id="pin" placeholder="1234" required>
                </div>
                <button class="btn">🛡️ Masuk Admin</button>
            </form>
        </div>
    </div>

    <!-- APP -->
    <div id="app">
        <header>
            <h1 id="title">Dashboard</h1>
            <p id="lbl"></p>
            <button class="logout" onclick="loc()">Keluar</button>
        </header>

        <!-- Admin Panel -->
        <div id="ad" style="display: none;">
            <div class="card">
                <h2>⚙️ Aksi</h2>
                <button class="btn" onclick="ld()">🔄 Refresh Data</button>
            </div>
            <div class="grid">
                <div class="stat"><div class="v" id="st1">0</div><div>Hari Ini</div></div>
                <div class="stat"><div class="v" id="st2">0</div><div>Minggu Ini</div></div>
                <div class="stat"><div class="v" id="st3">0</div><div>Bulan Ini</div></div>
                <div class="stat"><div class="v" id="st4">0/12</div><div>Aktif</div></div>
            </div>
            <div class="card">
                <h2>📜 Semua Data</h2>
                <div style="overflow-x: auto;">
                    <table>
                        <thead><tr><th>Waktu</th><th>Nama</th><th>Asrama</th><th>Kegiatan</th><th>Foto</th></tr></thead>
                        <tbody id="tb1"><tr><td colspan="5" style="text-align: center; padding: 20px;">Klik Refresh</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Musyrif Panel -->
        <div id="mv">
            <div class="card">
                <h2>📅 Jadwal Hari Ini</h2>
                <div class="sched" id="sch"></div>
            </div>
            <div class="card">
                <h2>📝 Input Absensi</h2>
                <form id="absen">
                    <div class="form">
                        <label>Kegiatan</label>
                        <select id="act" required><option value="">-- Pilih --</option></select>
                    </div>
                    <div class="form">
                        <label>Foto</label>
                        <input type="file" id="foto" accept="image/*" capture="user" required>
                    </div>
                    <div class="form">
                        <label>Catatan</label>
                        <textarea id="cat" rows="2" style="width: 100%; padding: 10px; border: 2px solid var(--border); border-radius: 8px;"></textarea>
                    </div>
                    <button class="btn" id="btns">✅ Kirim</button>
                </form>
            </div>
            <div class="card">
                <h2>📜 Riwayat Saya</h2>
                <div style="overflow-x: auto;">
                    <table>
                        <thead><tr><th>Waktu</th><th>Kegiatan</th><th>Foto</th></tr></thead>
                        <tbody id="tb2"><tr><td colspan="3" style="text-align: center; padding: 15px;">Belum ada</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DATA MUSYRIF
        const MUS = {
            "al-hakim": { n: "Al Hakim", m: { "Ali Mashuri": "ali123", "Ali Zahid": "zahid123", "Reva Dwi": "reva123", "Imam Syafi'i": "imam123" } },
            "al-fattah": { n: "Al Fattah", m: { "Fattahilah": "fattah123", "Brian Adi": "brian123", "Babil Yasar": "babil123", "Fahmi": "fahmi123", "Wawan Febi": "wawan123" } },
            "al-karim": { n: "Al Karim", m: { "Bima Julian": "bima123", "Irfan Khoirul": "irfan123", "Rizki Alfian": "rizki123" } }
        };
        
        // JADWAL
        const JOBS = [
            { n: "Membangunkan Santri", t: "03:45", e: "04:15", d: [0,1,2,3,4,5,6] },
            { n: "Pengajian Subuh", t: "05:00", e: "05:45", d: [0,1,2,3,4,5,6] },
            { n: "Piket Kamar", t: "16:30", e: "17:30", d: [0,1,2,3,4,5,6] },
            { n: "Jam Tidur", t: "21:30", e: "22:00", d: [0,1,2,3,4,5,6] }
        ];

        let role = null, usr = null, asm = null;
        // LOAD DATA dari localStorage
        let data = JSON.parse(localStorage.getItem('absensi_data') || '[]');

        // UTILITIES
        const $ = id => document.getElementById(id);
        const err = m => { $('err').textContent = m; $('err').style.display = 'block'; setTimeout(() => $('err').style.display = 'none', 3000); };
        const loc = () => location.reload();
        const saveData = () => localStorage.setItem('absensi_data', JSON.stringify(data));

        // SWITCH TAB
        function sw(t) {
            document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            $('fm').style.display = t === 'm' ? 'block' : 'none';
            $('fa').style.display = t === 'm' ? 'none' : 'block';
            $('err').style.display = 'none';
        }

        // UPDATE MUSYRIF SELECT
        function um() {
            const a = $('as').value, s = $('nm');
            s.innerHTML = '<option value="">-- Pilih --</option>';
            if (a && MUS[a]) {
                s.disabled = false;
                Object.keys(MUS[a].m).forEach(n => s.innerHTML += `<option value="${n}">${n}</option>`);
            } else {
                s.disabled = true;
            }
        }

        // WA FORGOT
        function wf() {
            const n = $('nm').value;
            if (!n) return alert('Pilih nama dulu');
            window.open(`https://wa.me/6285893588373?text=${encodeURIComponent(`Saya ${n} lupa password`)}`);
        }

        // LOGIN MUSYRIF
        $('fm').onsubmit = e => {
            e.preventDefault();
            const a = $('as').value, n = $('nm').value, p = $('pw').value;
            if (MUS[a]?.m[n] === p) {
                login(n, MUS[a].m[n], 'm', a);
            } else {
                err('Nama/password salah');
            }
        };

        // LOGIN ADMIN
        $('fa').onsubmit = e => {
            e.preventDefault();
            if ($('pin').value === '1234') {
                login('Admin', '1234', 'a', null);
            } else {
                alert('PIN salah');
            }
        };

        // LOGIN FUNCTION
        function login(name, pass, r, a) {
            role = r;
            usr = { name, pass };
            asm = a;
            $('login').style.display = 'none';
            $('app').style.display = 'block';
            $('title').textContent = r === 'a' ? '🛡️ Admin' : '📋 Musyrif';
            $('lbl').textContent = `${name} ${a ? '| ' + MUS[a].n : ''}`;
            $('ad').style.display = r === 'a' ? 'block' : 'none';
            $('mv').style.display = r === 'a' ? 'none' : 'block';
            ld();
            rs();
            uj();
        }

        // RENDER SCHEDULE
        function rs() {
            const d = new Date().getDay();
            $('sch').innerHTML = JOBS.filter(j => j.d.includes(d)).map(j =>
                `<div class="sched-item"><div class="time">${j.t} - ${j.e}</div><div>${j.n}</div></div>`
            ).join('') || '<p style="color: #666;">Tidak ada jadwal hari ini</p>';
        }

        // UPDATE JOBS SELECT
        function uj() {
            const d = new Date().getDay(), s = $('act');
            s.innerHTML = '<option value="">-- Pilih --</option>';
            JOBS.filter(j => j.d.includes(d)).forEach(j => {
                s.innerHTML += `<option value="${j.n}">${j.n} (${j.t} - ${j.e})</option>`;
            });
        }

        // LOAD DATA
        function ld() {
            data = JSON.parse(localStorage.getItem('absensi_data') || '[]');
            if (role === 'a') rt1();
            else rt2();
            updStats();
        }

        // RENDER TABLE ADMIN
        function rt1() {
            if (!data.length) {
                $('tb1').innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 20px;">Belum ada data</td></tr>';
                return;
            }
            $('tb1').innerHTML = data.slice().reverse().map(d => `
                <tr>
                    <td>${new Date(d.ts).toLocaleString()}</td>
                    <td>${d.nm}</td>
                    <td>${d.as || '-'}</td>
                    <td>${d.kg}</td>
                    <td>${d.ft ? `<img src="${d.ft}" class="thumb">` : '-'}</td>
                </tr>
            `).join('');
        }

        // RENDER TABLE MUSYRIF
        function rt2() {
            const my = data.filter(d => d.nm === usr.name).reverse();
            if (!my.length) {
                $('tb2').innerHTML = '<tr><td colspan="3" style="text-align: center; padding: 15px;">Belum ada riwayat</td></tr>';
                return;
            }
            $('tb2').innerHTML = my.map(d => `
                <tr>
                    <td>${new Date(d.ts).toLocaleString()}</td>
                    <td>${d.kg}</td>
                    <td>${d.ft ? `<img src="${d.ft}" class="thumb">` : '-'}</td>
                </tr>
            `).join('');
        }

        // UPDATE STATS
        function updStats() {
            const td = new Date().toDateString(), wk = Date.now() - 7 * 864e5, mo = Date.now() - 30 * 864e5;
            $('st1').textContent = data.filter(x => new Date(x.ts).toDateString() === td).length;
            $('st2').textContent = data.filter(x => new Date(x.ts) >= wk).length;
            $('st3').textContent = data.filter(x => new Date(x.ts) >= mo).length;
            const act = new Set(data.filter(x => new Date(x.ts) >= wk).map(x => x.nm));
            $('st4').textContent = `${act.size}/12`;
        }

        // SUBMIT ABSENSI
        $('absen').onsubmit = async e => {
            e.preventDefault();
            const kg = $('act').value, ft = $('foto').files[0];
            if (!kg || !ft) return alert('Lengkapi semua field');
            
            const btn = $('btns');
            btn.disabled = true;
            btn.textContent = 'Mengirim...';
            
            try {
                const b64 = await new Promise((r, j) => {
                    const rd = new FileReader();
                    rd.onload = () => r(rd.result);
                    rd.onerror = j;
                    rd.readAsDataURL(ft);
                });
                
                data.push({
                    ts: new Date().toISOString(),
                    nm: usr.name,
                    as: asm ? MUS[asm].n : '',
                    kg: kg,
                    ft: b64,
                    ct: $('cat').value
                });
                
                saveData();
                alert('✅ Absensi berhasil!');
                $('absen').reset();
                ld();
            } catch (err) {
                alert('❌ Gagal: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '✅ Kirim';
            }
        };

        // INIT
        rs();
        uj();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Musyrif - Laporan PDF</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f5f7f5; color: #1b1b1b; padding: 16px; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #2e7d32, #4caf50); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 25px; border-radius: 16px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .login-header { text-align: center; margin-bottom: 20px; }
        .login-header h2 { color: #2e7d32; margin-bottom: 5px; }
        .login-tabs { display: flex; margin-bottom: 15px; border-bottom: 2px solid #e0e0e0; }
        .tab-btn { flex: 1; padding: 10px; background: none; border: none; cursor: pointer; font-weight: 600; color: #616161; }
        .tab-btn.active { color: #2e7d32; border-bottom: 3px solid #2e7d32; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: 500; font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; }
        .btn { width: 100%; padding: 11px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; margin-bottom: 10px; color: white; }
        .btn-primary { background: #2e7d32; }
        .btn-wa { background: #25D366; }
        .btn-pdf { background: #d32f2f; }
        .error-msg { background: #ffebee; color: #d32f2f; padding: 8px; border-radius: 6px; font-size: 0.85rem; margin-bottom: 10px; display: none; }
        #main-app { display: none; max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 20px; padding: 15px; background: linear-gradient(135deg, #2e7d32, #4caf50); color: white; border-radius: 12px; position: relative; }
        .logout-btn { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px; border-radius: 6px; cursor: pointer; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card h2 { margin-bottom: 12px; color: #2e7d32; font-size: 1.1rem; border-bottom: 2px solid #e0e0e0; padding-bottom: 6px; }
        .admin-section { display: none; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .stat-card { background: linear-gradient(135deg, #2e7d32, #4caf50); color: white; padding: 12px; border-radius: 10px; text-align: center; }
        .stat-card h4 { font-size: 0.8rem; opacity: 0.9; }
        .stat-card .val { font-size: 1.5rem; font-weight: bold; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
        .btn-group .btn { flex: 1; min-width: 100px; font-size: 0.9rem; padding: 10px; }
        .schedule-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
        .schedule-item { padding: 10px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fafafa; }
        .schedule-item.active { border-color: #2e7d32; background: #e8f5e9; }
        .time { font-weight: bold; color: #2e7d32; font-size: 0.9rem; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        th { background: #f1f1f1; }
        .photo-thumb { width: 35px; height: 35px; object-fit: cover; border-radius: 4px; }
        .report-section { display: none; background: white; padding: 30px; border-radius: 12px; margin-bottom: 20px; }
        .report-header { text-align: center; border-bottom: 3px solid #2e7d32; padding-bottom: 20px; margin-bottom: 30px; }
        .report-meta { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 20px 0; background: #f5f5f5; padding: 15px; border-radius: 8px; }
        @media (max-width: 600px) { .schedule-grid { grid-template-columns: 1fr; } .btn-group { flex-direction: column; } .report-meta { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <div class="login-header"><h2>📋 Absensi Musyrif</h2><p style="color:#666;font-size:0.9rem;">Pilih akses masuk</p></div>
            <div class="login-tabs">
                <button class="tab-btn active" onclick="switchTab('musyrif')">👤 Musyrif</button>
                <button class="tab-btn" onclick="switchTab('admin')">🛡️ Admin</button>
            </div>
            <div id="login-error" class="error-msg"></div>
            <form id="musyrif-form">
                <div class="form-group">
                    <label>Asrama</label>
                    <select id="m-asrama" required onchange="updateMusyrifSelect()">
                        <option value="">-- Pilih Asrama --</option>
                        <option value="al-hakim">Asrama Al Hakim</option>
                        <option value="al-fattah">Asrama Al Fattah</option>
                        <option value="al-karim">Asrama Al Karim</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nama Musyrif</label>
                    <select id="m-name" required disabled>
                        <option value="">-- Pilih Asrama Terlebih Dahulu --</option>
                    </select>
                </div>
                <div class="form-group"><label>Password</label><input type="password" id="m-pass" required></div>
                <button type="submit" class="btn btn-primary">🔐 Masuk Musyrif</button>
                <button type="button" class="btn btn-wa" onclick="waForgot()">💬 Lupa Password? (WA)</button>
            </form>
            <form id="admin-form" style="display:none;">
                <div class="form-group"><label>PIN Admin</label><input type="password" id="a-pin" placeholder="Masukkan PIN Admin" required></div>
                <button type="submit" class="btn btn-primary">🛡️ Masuk Admin</button>
            </form>
        </div>
    </div>

    <div id="main-app">
        <header>
            <h1 id="app-title">Dashboard</h1>
            <p id="user-label" style="font-size:0.9rem;opacity:0.9;margin-top:4px;"></p>
            <button class="logout-btn" onclick="location.reload()">Keluar</button>
        </header>
        <div id="admin-panel" class="admin-section">
            <div class="card">
                <h2>⚙️ Pengaturan & Aksi</h2>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="loadData()">🔄 Refresh Data</button>
                    <button class="btn btn-pdf" onclick="generatePDF()">📄 Laporan PDF</button>
                    <button class="btn btn-wa" onclick="waReminder()">🔔 Cek & WA</button>
                </div>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><h4>Hari Ini</h4><div class="val" id="s-today">0</div></div>
                <div class="stat-card"><h4>Minggu Ini</h4><div class="val" id="s-week">0</div></div>
                <div class="stat-card"><h4>Bulan Ini</h4><div class="val" id="s-month">0</div></div>
                <div class="stat-card"><h4>Total</h4><div class="val" id="s-total">0</div></div>
            </div>
            <div class="card">
                <h2>📜 Data Absensi</h2>
                <div style="overflow-x:auto;"><table><thead><tr><th>Waktu</th><th>Nama</th><th>Kegiatan</th><th>Catatan</th></tr></thead><tbody id="admin-tbody"><tr><td colspan="4" style="text-align:center;padding:20px;">Klik "Refresh Data"</td></tr></tbody></table></div>
            </div>
        </div>
        <div id="musyrif-view" style="display:none;">
            <div class="card">
                <h2>📝 Input Absensi</h2>
                <form id="absen-form">
                    <div class="form-group"><label>Kegiatan</label><select id="act-select" required><option value="">-- Pilih Kegiatan --</option></select></div>
                    <div class="form-group"><label>Catatan</label><textarea id="notes" rows="2" style="width:100%;padding:10px;border:2px solid #e0e0e0;border-radius:8px;"></textarea></div>
                    <button type="submit" class="btn btn-primary" id="sub-btn">✅ Kirim Absensi</button>
                </form>
            </div>
            <div class="card">
                <h2>📜 Riwayat Saya</h2>
                <div style="overflow-x:auto;"><table><thead><tr><th>Waktu</th><th>Kegiatan</th></tr></thead><tbody id="my-tbody"><tr><td colspan="2" style="text-align:center;padding:15px;">Belum ada riwayat</td></tr></tbody></table></div>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxZf_fvTjMpEIGdBhoNkkL23Af3IU8TcU1w4f7uUfRcf3fCpfNWKt5TTIVz3VkC6w8YPw/exec";
        const ADMIN_PIN = "1234";
        const WA_ADMIN = "6285893588373";
        const MUSYRIF_DB = { "Ali Mashuri": { pass: "ali123" }, "Reva Dwi": { pass: "reva123" }, "Ali Zahid": { pass: "zahid123" }, "Imam Syafi'i": { pass: "imam123" } };
        const JOBS = ["Membangunkan Santri", "Pengajian Ba'da Subuh", "Menggobraki Sekolah Formal", "Menggobraki Piket & Maghrib", "Mendampingi Dalail", "Pendampingan Muthola'ah", "Mendampingi Tawasulan", "Menertibkan Jam Tidur"];
        let role = null, user = null, data = [];

        function switchTab(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.tab-btn:nth-child(${t==='admin'?2:1})`).classList.add('active');
            document.getElementById('musyrif-form').style.display = t==='admin'?'none':'block';
            document.getElementById('admin-form').style.display = t==='admin'?'block':'none';
            document.getElementById('login-error').style.display = 'none';
        }

        function updateMusyrifSelect() {
            const sel = document.getElementById('m-name');
            sel.innerHTML = '<option value="">-- Pilih Musyrif --</option>';
            sel.disabled = false;
            Object.keys(MUSYRIF_DB).forEach(name => { sel.innerHTML += `<option value="${name}">${name}</option>`; });
        }

        function waForgot() {
            const n = document.getElementById('m-name').value;
            if(!n) return alert('Pilih nama dulu!');
            window.open(`https://wa.me/${WA_ADMIN}?text=${encodeURIComponent(`Halo Admin, saya ${n} lupa password.`)}`);
        }

        document.getElementById('musyrif-form').onsubmit = e => {
            e.preventDefault();
            const n = document.getElementById('m-name').value;
            const p = document.getElementById('m-pass').value;
            if (MUSYRIF_DB[n] && MUSYRIF_DB[n].pass === p) { login(n, 'musyrif'); }
            else { const err = document.getElementById('login-error'); err.textContent = 'Nama atau password salah!'; err.style.display = 'block'; setTimeout(() => err.style.display = 'none', 3000); }
        };

        document.getElementById('admin-form').onsubmit = e => {
            e.preventDefault();
            if (document.getElementById('a-pin').value === ADMIN_PIN) { login('Admin', 'admin'); }
            else { const err = document.getElementById('login-error'); err.textContent = 'PIN salah!'; err.style.display = 'block'; setTimeout(() => err.style.display = 'none', 3000); }
        };

        function login(name, r) {
            role = r; user = {name};
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('app-title').textContent = r==='admin' ? '🛡️ Dashboard Admin' : '📋 Absensi Musyrif';
            document.getElementById('user-label').textContent = name;
            document.getElementById('admin-panel').style.display = r==='admin' ? 'block' : 'none';
            document.getElementById('musyrif-view').style.display = r==='admin' ? 'none' : 'block';
            loadData();
            if (r === 'musyrif') {
                const sel = document.getElementById('act-select');
                JOBS.forEach(j => { sel.innerHTML += `<option value="${j}">${j}</option>`; });
            }
        }

        async function loadData() {
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                data = await res.json();
                if (role === 'admin') {
                    document.getElementById('admin-tbody').innerHTML = data.length ? data.slice().reverse().map(d => `<tr><td>${new Date(d.Timestamp).toLocaleString('id-ID')}</td><td>${d['Nama Musyrif']||'-'}</td><td>${d.Kegiatan||'-'}</td><td>${d.Catatan||'-'}</td></tr>`).join('') : '<tr><td colspan="4" style="text-align:center;padding:20px;">Belum ada data</td></tr>';
                    document.getElementById('s-total').textContent = data.length;
                } else {
                    const my = data.filter(d => d['Nama Musyrif'] === user.name);
                    document.getElementById('my-tbody').innerHTML = my.length ? my.slice().reverse().map(d => `<tr><td>${new Date(d.Timestamp).toLocaleString('id-ID')}</td><td>${d.Kegiatan||'-'}</td></tr>`).join('') : '<tr><td colspan="2" style="text-align:center;padding:15px;">Belum ada riwayat</td></tr>';
                }
                alert(`✅ Berhasil memuat ${data.length} data`);
            } catch (e) {
                alert('❌ Gagal: ' + e.message);
            }
        }

        document.getElementById('absen-form').onsubmit = async e => {
            e.preventDefault();
            const btn = document.getElementById('sub-btn');
            btn.disabled = true; btn.textContent = 'Mengirim...';
            try {
                const pay = { musyrif: user.name, kegiatan: document.getElementById('act-select').value, catatan: document.getElementById('notes').value };
                const res = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(pay) });
                const out = await res.json();
                if (out.status === 'success') { alert('✅ Berhasil!'); document.getElementById('absen-form').reset(); loadData(); }
                else throw new Error(out.message);
            } catch (err) { alert('❌ Gagal: ' + err.message); }
            finally { btn.disabled = false; btn.textContent = '✅ Kirim Absensi'; }
        };

        function generatePDF() {
            if (!data.length) return alert('Tidak ada data!');
            alert('Fitur PDF - Total data: ' + data.length);
        }

        function waReminder() {
            const today = new Date().toDateString();
            const miss = Object.keys(MUSYRIF_DB).filter(n => !data.some(d => d['Nama Musyrif'] === n && new Date(d.Timestamp).toDateString() === today));
            if (!miss.length) return alert('✅ Semua sudah absen!');
            window.open(`https://wa.me/?text=${encodeURIComponent(`Reminder: ${miss.join(', ')} belum absen.`)}`);
        }
    </script>
</body>
</html>
